<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#f5f9ff;font-family:var(--font-inter)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.alert{display:flex;gap:10px;padding:12px 14px;border-radius:18px;border:1px solid;font-size:13px;line-height:1.5;max-width:300px}
.icon{font-size:14px}
.success{background:#d1fae5;border-color:#a7f3d0;color:#065f46}
.warn{background:#fef3c7;border-color:#fde68a;color:#92400e}
.err{background:#ffe4e6;border-color:#fecdd3;color:#9f1239}
.info{background:#e0f2fe;border-color:#bae6fd;color:#075985}
</style></head><body>
<div class="row">
  <div class="alert success"><span class="icon">✓</span><span>Visa documents saved.</span></div>
  <div class="alert warn"><span class="icon">⚠</span><span>Voice input is already active. Try again in a moment.</span></div>
  <div class="alert err"><span class="icon">!</span><span>I ran into a connection issue while trying to help.</span></div>
  <div class="alert info"><span class="icon">i</span><span>Saved chats appear here after your first message.</span></div>
</div>
</body></html>
