<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:28px;background:linear-gradient(180deg,#fdfefe,#f5f9ff);font-family:var(--font-inter)}
.row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.box{background:#fff;border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#475569;font-weight:600;padding:8px 12px;min-width:64px}
</style></head><body>
<div class="row">
  <div class="box" style="border-radius:6px">XS<br><span style="opacity:.5;font-weight:400">6</span></div>
  <div class="box" style="border-radius:10px">SM<br><span style="opacity:.5;font-weight:400">10</span></div>
  <div class="box" style="border-radius:16px">MD<br><span style="opacity:.5;font-weight:400">16</span></div>
  <div class="box" style="border-radius:18px">LG<br><span style="opacity:.5;font-weight:400">18</span></div>
  <div class="box" style="border-radius:20px">XL<br><span style="opacity:.5;font-weight:400">20</span></div>
  <div class="box" style="border-radius:24px">2XL<br><span style="opacity:.5;font-weight:400">24</span></div>
  <div class="box" style="border-radius:28px">3XL<br><span style="opacity:.5;font-weight:400">28</span></div>
  <div class="box" style="border-radius:32px">4XL<br><span style="opacity:.5;font-weight:400">32</span></div>
  <div class="box" style="border-radius:9999px;padding:8px 18px">PILL</div>
</div>
</body></html>
