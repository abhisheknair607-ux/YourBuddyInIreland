<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#f5f9ff;font-family:var(--font-inter)}
.row{display:flex;flex-wrap:wrap;gap:8px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9999px;font-size:14px;font-weight:500;border:1px solid;min-height:44px}
.t-sky{background:#e0f2fe;border-color:#bae6fd;color:#0369a1}
.t-blue{background:#dbeafe;border-color:#bfdbfe;color:#1d4ed8}
.t-violet{background:#ede9fe;border-color:#ddd6fe;color:#6d28d9}
.t-amber{background:#fef3c7;border-color:#fde68a;color:#b45309}
.t-emerald{background:#d1fae5;border-color:#a7f3d0;color:#047857}
.t-rose{background:#ffe4e6;border-color:#fecdd3;color:#be123c}
.t-teal{background:#ccfbf1;border-color:#99f6e4;color:#0f766e}
.t-indigo{background:#e0e7ff;border-color:#c7d2fe;color:#4338ca}
.t-orange{background:#ffedd5;border-color:#fed7aa;color:#c2410c}
.t-slate{background:#f1f5f9;border-color:#e2e8f0;color:#334155}
</style></head><body>
<div class="row">
  <span class="chip t-sky">Visa</span>
  <span class="chip t-blue">Universities</span>
  <span class="chip t-violet">Courses</span>
  <span class="chip t-emerald">Accommodation</span>
  <span class="chip t-amber">Loans</span>
  <span class="chip t-rose">Healthcare</span>
  <span class="chip t-teal">Transport</span>
  <span class="chip t-indigo">Community</span>
  <span class="chip t-orange">Driving</span>
  <span class="chip t-slate">Utilities</span>
</div>
</body></html>
