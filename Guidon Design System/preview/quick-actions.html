<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-inter)}
.row{display:flex;gap:12px;flex-wrap:wrap}
.tile{width:120px;aspect-ratio:1;border-radius:18px;background:rgba(255,255,255,.7);border:1px solid #e2e8f0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-size:11px;font-weight:600;color:#0f172a;cursor:pointer;text-align:center;padding:8px}
.tile .ico{width:34px;height:34px;border-radius:14px;background:#e0f2fe;color:#0369a1;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600}
.tile:hover{background:#fff;border-color:#cbd5e1}
.tile.active{background:#e0f2fe;border-color:#bae6fd}
</style></head><body>
<div class="row">
  <div class="tile active"><div class="ico">📋</div>Visa</div>
  <div class="tile"><div class="ico">🏠</div>House</div>
  <div class="tile"><div class="ico">🎓</div>Uni</div>
  <div class="tile"><div class="ico">💸</div>Loan</div>
</div>
<p style="font-size:11px;color:#64748b;margin-top:14px">Sidebar quick-action tiles · 4-col grid · single icon · 4-letter label</p>
</body></html>
