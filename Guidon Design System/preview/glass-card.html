<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:28px;background:linear-gradient(180deg,#fdfefe,#eef5ff);font-family:var(--font-inter)}
.card{background:rgba(255,255,255,.7);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.7);border-radius:28px;padding:24px;box-shadow:0 24px 80px rgba(15,23,42,.12);max-width:480px}
.eyebrow{font-size:11px;font-weight:600;color:#0369a1;text-transform:uppercase;letter-spacing:.24em;margin-bottom:8px}
h3{font-family:var(--font-poppins);font-size:20px;font-weight:600;color:#020617;margin:0 0 8px}
p{font-size:14px;line-height:1.55;color:#475569;margin:0}
</style></head><body>
<div class="card">
  <div class="eyebrow">Live Preview</div>
  <h3>A dashboard that guides the whole Ireland journey</h3>
  <p>Visa paperwork, accommodation, education loans, university shortlists — all in one calm place.</p>
</div>
</body></html>
