<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#f5f9ff;font-family:var(--font-inter)}
.stack{display:flex;flex-direction:column;gap:12px;max-width:520px}
.bubble{padding:12px 16px;border-radius:20px;font-size:14px;line-height:1.55;max-width:80%;box-shadow:0 14px 35px rgba(15,23,42,.10)}
.user{align-self:flex-end;background:linear-gradient(135deg,#2563eb,#1d4ed8,#1e3a8a);color:#fff;border-bottom-right-radius:6px}
.assistant{align-self:flex-start;background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.8);color:#334155;border-bottom-left-radius:6px}
.src{font-size:9px;font-weight:600;letter-spacing:.16em;color:#64748b;text-transform:uppercase;background:#f1f5f9;border-radius:9999px;padding:2px 8px;display:inline-block;margin-bottom:6px}
.row{display:flex;gap:8px;align-items:flex-end}
.av{width:36px;height:36px;border-radius:9999px;background:#fff;border:1px solid #bae6fd;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#2563eb}
</style></head><body>
<div class="stack">
  <div class="row"><div class="av">G</div><div class="bubble assistant"><span class="src">Knowledge Docs</span><br>Namaste! I can help you compare universities in Ireland.</div></div>
  <div class="bubble user">Help me compare MSc Data Analytics in Dublin and Limerick.</div>
</div>
</body></html>
