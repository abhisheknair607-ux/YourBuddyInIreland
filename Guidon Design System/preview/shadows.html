<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:36px;background:linear-gradient(180deg,#fdfefe,#eef5ff);font-family:var(--font-inter)}
.row{display:flex;gap:28px;align-items:center;flex-wrap:wrap}
.box{width:140px;height:78px;background:#fff;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#475569;font-weight:600;text-align:center;line-height:1.3;padding:6px}
</style></head><body>
<div class="row">
  <div class="box" style="box-shadow:0 14px 35px rgba(15,23,42,.10)">Card SM<br><span style="opacity:.55;font-weight:400">14×35 / 10%</span></div>
  <div class="box" style="box-shadow:0 24px 80px rgba(15,23,42,.12)">Card<br><span style="opacity:.55;font-weight:400">24×80 / 12%</span></div>
  <div class="box" style="box-shadow:0 16px 40px rgba(59,130,246,.22);background:linear-gradient(135deg,#0ea5e9,#2563eb);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.2)">Glow blue<br><span style="opacity:.85;font-weight:400">CTA</span></div>
  <div class="box" style="box-shadow:inset 0 1px 0 rgba(255,255,255,.65),0 0 0 1px rgba(148,163,184,.12),0 18px 60px rgba(15,23,42,.12);background:rgba(255,255,255,.85);backdrop-filter:blur(20px)">Surface ring</div>
</div>
</body></html>
