<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-inter)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.tone{padding:12px;border-radius:14px;display:flex;flex-direction:column;gap:4px}
.lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.18em}
.note{font-size:12px;color:#475569}
</style></head><body>
<div class="grid">
  <div class="tone" style="background:#d1fae5;border:1px solid #a7f3d0"><div class="lbl" style="color:#065f46">Success</div><div class="note">#059669 · emerald</div></div>
  <div class="tone" style="background:#fef3c7;border:1px solid #fde68a"><div class="lbl" style="color:#92400e">Warning</div><div class="note">#d97706 · amber</div></div>
  <div class="tone" style="background:#ffe4e6;border:1px solid #fecdd3"><div class="lbl" style="color:#9f1239">Danger</div><div class="note">#e11d48 · rose</div></div>
  <div class="tone" style="background:#e0f2fe;border:1px solid #bae6fd"><div class="lbl" style="color:#075985">Info</div><div class="note">#0284c7 · sky</div></div>
</div>
</body></html>
