<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#f5f9ff;font-family:var(--font-inter)}
.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
button{font-family:inherit;font-weight:600;font-size:14px;border:0;cursor:pointer}
.primary{background:linear-gradient(90deg,#0ea5e9,#2563eb,#4f46e5);color:#fff;border-radius:9999px;padding:12px 22px;box-shadow:0 16px 40px rgba(59,130,246,.22);min-height:44px}
.secondary{background:rgba(255,255,255,.85);color:#334155;border:1px solid #e2e8f0;border-radius:9999px;padding:12px 20px;min-height:44px}
.ghost{background:transparent;color:#475569;padding:12px 18px;min-height:44px;border-radius:9999px}
.icon{width:40px;height:40px;border-radius:9999px;background:#fff;border:1px solid #e2e8f0;color:#475569;display:inline-flex;align-items:center;justify-content:center}
.danger{background:#fff;border:1px solid #fecdd3;color:#9f1239;border-radius:9999px;padding:10px 16px;min-height:40px;font-size:13px}
</style></head><body>
<div class="row">
  <button class="primary">Start Planning →</button>
  <button class="secondary">Resources Hub</button>
  <button class="ghost">Cancel</button>
  <button class="icon">＋</button>
  <button class="danger">↻ Try again</button>
</div>
</body></html>
